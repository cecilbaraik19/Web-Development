<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Parameter Return Value</title>
</head>
<body>
    <p id="output"></p>
    <script>
        const output = document.getElementById("output");
        function sum_of_ten_no(){
            let s=0,i;
            for(i=1;i<=10;i++){
                output.innerHTML+=i+"<br>";
                s=s+i;
            }
            return s;
        }
        let r = sum_of_ten_no();
        output.innerHTML+="Sum of first ten number "+r;
    </script>
</body>
</html>
