<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch Case</title>
</head>
<body>
    <script>
        name=prompt("Enter Name")
        switch(name){
            case "Modi":
                document.write("<font color='red'>PM of India</font>")
                break;
            case "Soren":
                document.write("<font color='green'>CM of Jharkhand</font>")
                break;
            case "Rahul":
                document.write("<font color='blue'>Leader of Congress</font>")
                break;
            default:
                document.write("Invalid Name")
        }
    </script>
</body>
</html>
