<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Parameter No Return Value Function</title>
</head>
<body>
    <p id="output"></p>
    <script>
        const output = document.getElementById("output");
        function disp(){
            let a=parseInt(prompt("Enter the value a"));
            let b=parseInt(prompt("Enter the value b"));
            let c=a+b;
            output.innerHTML="Value of a ="+a+ "<br> Value of b= "+b+"<br> Value of c="+c;
        }
        disp();
    </script>
</body>
</html>
