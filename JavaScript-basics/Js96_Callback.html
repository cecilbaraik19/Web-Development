<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Callback Function</h1>
    <h2>Function Sequence</h2>
    <p>Javascript function are executing in the sequence they are called</p>
    <p id="demo"></p>
    <script>
        function myDisplayer(some){
            document.getElementById("demo").innerHTML+=some;
        }
        function myFirst(){
            myDisplayer("hello <br>");
        }
        function mySecond(){
            myDisplayer("Good Bye");
        }
        myFirst();
        mySecond();
    </script>
</body>
</html>
