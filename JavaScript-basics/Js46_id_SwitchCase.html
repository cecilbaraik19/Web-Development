<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="output"></p>
    <script>
        const output = document.getElementById("output")
        let roll=parseInt(prompt("Enter Roll No."))
        switch(roll){
            case 1:output.innerHTML="Steve Rogers"
                break;
            case 2:output.innerHTML="Tony Stark"
                break;
            default:output.innerHTML="invalid Roll No."
        }
    </script>
</body>
</html>
