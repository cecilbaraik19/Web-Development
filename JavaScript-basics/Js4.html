<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font</title>
</head>
<body>
    <script>
        document.write("<font color='red'> This font color is Red</font> <br>")
        document.write("<font size='10'> This text size is 10</font> <br>")
        document.write("<hr color='red' size='5'> </hr> <br>")
    </script>
</body>
</html>
