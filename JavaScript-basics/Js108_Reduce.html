<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>JavaScript</h2>
    <p>Subtract the numbers in the Array, starting from the left:</p>
    <p id="demo"></p>
    <script>
        const numbers = [145,58,26,10];
        document.getElementById("demo").innerHTML=numbers.reduce(myFunction);
        function myFunction(total,num){
            return total -num;
        }
    </script>
</body>
</html>
