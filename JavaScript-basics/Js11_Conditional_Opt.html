<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conditional Operator</title>
</head>
<body>
    <script>
        a=parseInt(prompt("Enter the value of a"))
        b=parseInt(prompt("Enter the value of b"))
        document.write("Value of a:"+a+"<br>")
        document.write("Value of b:"+b+"<br>")
        max = a>b?a:b;
        document.write("Maximum No.:"+max)
    </script>
</body>
</html>
