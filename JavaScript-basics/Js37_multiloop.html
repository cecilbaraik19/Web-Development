<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern</title>
</head>
<body>
    <script>
        for(let i = 5; i >= 1; i--) {

            // Spaces
            for(let j = 5; j > i; j--) {
                document.write("&nbsp;&nbsp;");
            }

            // Stars
            for(let k = 1; k <= (i * 2 - 1); k++) {
                document.write("*");
            }

            document.write("<br>");
        }
    </script>
</body>
</html>
