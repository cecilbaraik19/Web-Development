<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="output"></p>
    <script>
        const output=document.getElementById("output")
        for(let i=1;i<=5;i++){
            for(let j=5;j>=i;j--){
                output.innerHTML+="&nbsp&nbsp"
            }
            for(k=1;k<i*2;k++){
                output.innerHTML+="*"
            }
            output.innerHTML+="<br>"
        }
    </script>
</body>
</html>
