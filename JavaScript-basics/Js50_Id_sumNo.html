<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="output"></p>
    <script>
        const output=document.getElementById("output")
        let i = 1;
        let s = 0;
        do{
            output.innerHTML+=i+"<br>"
            s=s+i
            i++
        }while(i<=10)
        output.innerHTML+="<br>Sum of 1st ten no.:"+s
    </script>
</body>
</html>
