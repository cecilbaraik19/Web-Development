<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>If Else Condition</title>
</head>
<body>
    <script>
        age = parseInt(prompt("Enter your age"))
        if(age>=18){
            document.write("<font color='green'>You are eligible for vote</font>")
        }else{
            document.write("<font color='red'>You are NOT eligible for vote</font>")
        }
    </script>
</body>
</html>
