<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursion</title>
</head>
<body>
    <p id="output"></p>
    <script>
        const output = document.getElementById("output");
        function table(i,n){
            if(i<=10){
                output.innerHTML+=n+"x"+i+"="+n*i+"<br>";
                table(i+1,n);
            }
        }
        let n = parseInt(prompt("Enter any No."))
        table(1,n)
    </script>
</body>
</html>
