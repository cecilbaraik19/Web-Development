<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bold, Italic & Underline</title>
</head>
<body>
    <script>
        document.write("This is Example of <b>BOLD</b> <br>") 
        document.write("This is Example of <i>ITALIC</i> <br>")
        document.write("This is Example of <u>UNDERLINE</u> <br>")
    </script>
</body>
</html>
