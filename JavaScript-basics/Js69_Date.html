<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="output"></p>
    <script>
        const d = new Date();
        document.getElementById("output").innerHTML+=" Year: "+d.getFullYear();
        document.getElementById("output").innerHTML+=" Month: "+(d.getMonth()+1);
        document.getElementById("output").innerHTML+=" Date: "+d.getDate();
    </script>
</body>
</html>
