<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AND Operator</title>
</head>
<body>
    <script>
        a=parseInt(prompt("Enter the value of a"))
        b=parseInt(prompt("Enter the value of b"))
        c=parseInt(prompt("Enter the value of c"))
        if(a>b && a>c){
            document.write("Max No.:"+a)
        }else if(b>a && b>c){
            document.write("Max No.:"+b)
        }else{
            document.write("Max No.:"+c)
        }
    </script>
</body>
</html>
