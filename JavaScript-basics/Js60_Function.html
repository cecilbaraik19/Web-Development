<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Defined Function</title>
</head>
<body>
    <p id="output"></p>
    <script>
        const output = document.getElementById("output");
        let num = parseInt(prompt("Enter any no.:"));
        let r=Math.sqrt(num);
        output.innerHTML="Sqaure root " +num+" is "+r;
    </script>
</body>
</html>
