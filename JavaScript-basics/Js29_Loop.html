<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do While Loop</title>
</head>
<body>
    <script>
        let i = 1;
        let s = 0;
        let n = parseInt(prompt("Enter any number"));

        do {
            s = s + (i * i);

            if (i < n) {
                document.write(i * i + " + ");
            } else {
                document.write(i * i);
            }

            i++;
        } while (i <= n);

        document.write(" = " + s);
    </script>
</body>
</html>
