<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do while loop</title>
</head>
<body>
    <script>
        i=1
        s=0
        n=parseInt(prompt("Enter any no"))
        do{
            if(i<n){
                document.write(i*i+"+")
            }else{
                document.write(i*i)
            }
            while(i<=n)
            document.write("="+s);
        }
    </script>
</body>
</html>
