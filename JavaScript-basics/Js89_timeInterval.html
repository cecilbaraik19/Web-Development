<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <div id="output"></div>
    <script>
        document.getElementById("output").innerHTML="Wait for a Messsage!<br>";

        function timeout(){
            document.getElementById("output").innerHTML="This message is printed after 3 second!";
        }
    </script>
