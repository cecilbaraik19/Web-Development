<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable Declaration</title>
</head>
<body>
    <script>
        a=10;
        b=5;
        document.write("Value of a:" +a+ "<br>")
        document.write("Value of b:" +b+ "<br>")
        c=a+b;
        document.write("Sum of two number:"+c)
    </script>
</body>
</html>
