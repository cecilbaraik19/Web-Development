<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>taking input from user</title>
</head>
<body>
    <script>
        roll = parseInt(prompt("Enter Roll No."))
        name = prompt("Enter Name")
        marks = parseInt(prompt("Enter Marks"))
        per = parseFloat(prompt("Enter Percentage"))
        document.write("Name        :"+name+ "<br>")
        document.write("Roll No.    :"+roll+"<br>")
        document.write("Marks       :"+marks+"<br>")
        document.write("Percentage  :"+per+"<br>")
    </script>
</body>
</html>
