<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .level1{
            background-color: #ff9999;
            padding: 20px;
            text-align: center;
            max-width: 80%;
            cursor: pointer;
        }
        .level2{
            background-color: #99ff99;
            padding: 15px;
        }
        .level3{
            background-color: #9999ff;
            padding: 10px;
            cursor: pointer;
        }
        #message{
            margin-top:10px;
            font-weight: lighter;
            border: 1px solid #ddd;
            padding: 10px;
            max-width: 80%;
            background-color: #f9f9f9;
            border-radius: 5px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="level1" id="div1">
        Level1
        <div class="level2" id="div2">
            Level2
            <div class="level3" id="div3">
                Level3(Click Me!)
            </div>
        </div>
    </div>
    <div id="message"></div>
    <script>
        const messageElement = document.getElementById("message");
        document.getElementById("div1").addEventListener("click",function(event){
            messageElement.innerHTML+="Clicked on Level1.BackgroundColor:"+getComputedStyle(event.target).backgroundColor+"<br>";
        });
        document.getElementById("div2").addEventListener("click",function(event){
            messageElement.innerHTML+="Clicked on Level2.BackgroundColor:"+getComputedStyle(event.target).backgroundColor+"<br>";
        });
        document.getElementById("div3").addEventListener("click",function(event){
            messageElement.innerHTML+="Clicked on Level3.BackgroundColor:"+getComputedStyle(event.target).backgroundColor+"<br>";
        });
    </script>
</body>
</html>
