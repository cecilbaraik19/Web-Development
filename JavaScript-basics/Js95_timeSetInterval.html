<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #parent{
            position: relative;
            height: 50px;
            width: 500px;
            background-color: yellow;
        }
        #child{
            position: relative;
            height: 50px;
            width: 50px;
            background-color: red;
        }
    </style>
</head>
<body>
    <div id="parent">
        <div id="child"></div>
    </div>
    <script>
        let child = document.getElementById("child");
        let left = 0;
        setInterval(()=>{
            if(left<450){
                left+=5;
                child.style.left=left+"px";
            }
        },50);
    </script>
</body>
</html>
