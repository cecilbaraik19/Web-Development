<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conditional Operator</title>
</head>
<body>
    <script>
        marks=parseInt(prompt("Enter Marks"))
        result = marks>50?"<font color='green'>Pass</font>":"<font color='red'>Fail</font>"
        document.write("Result:"+result)
    </script>
</body>
</html>
