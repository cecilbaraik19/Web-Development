<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="output"></p>
    <script>
        const output = document.getElementById("output")
        i=1;
        while(i<=10){
            output.innerHTML+=i+"<br>"
            i++;
        }
    </script>
</body>
</html>
