<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1">
        <script>
        let c = 1
        for(let i=1;i<=5;i++){
            document.write("<tr>")
            for(let j=1;j<=i;j++){
                document.write("<td>"+(c++)+"</td>");
            }document.write("</tr>")
        }
    </script>
    </table>
</body>
</html>
