<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>if else if else condition</title>
</head>
<body>
    <script>
        marks=parseInt(prompt("Enter Marks"))
        if(marks>=90){
            document.write("Grade A")
        }else if(marks>=80){
            document.write("Grade B")
        }else if(marks>=70){
            document.write("Grade C")
        }else if(marks>=60){
            document.write("Grade D")
        }else if(marks>=45){
            document.write("Pass")
        }else{
            document.write("Try Again")
        }
    </script>
</body>
</html>
