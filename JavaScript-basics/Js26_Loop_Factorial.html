<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        f=1
        n=parseInt(prompt("Enter any No.:"))
        while(n>0){
            if(n>1){
                document.write(n+"x")
                f=f*n
            }else{
                document.write(n)
                f=f*n
            }
            n--
        }document.write("="+f)
    </script>
</body>
</html>
