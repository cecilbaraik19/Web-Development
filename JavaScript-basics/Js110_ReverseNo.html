<body>
    <script>
        let num = 12345;
        let revNumber=0;
        
        while(num>0){
            let lastDigit=num%10;
            revNumber = revNumber*10+lastDigit;
            num=parseInt(num/10);
        }
        console.log(revNumber);
    </script>
</body>
