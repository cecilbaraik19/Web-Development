<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch Case</title>
</head>
<body>
    <script>
        roll = parseInt(prompt("Enter the Roll No.:"))
        switch(roll){
            case 1:
                document.write("Kaliya")
                break;
            case 2:
                document.write("Anita")
                break;
            case 3:
                document.write("Allen")
                break;
            default:
                document.write("Invalid Roll No.")
        }
    </script>
</body>
</html>
