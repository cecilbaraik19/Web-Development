<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursion</title>
</head>
<body>
    <p id="output"></p>
    <script>
        const output = document.getElementById("output");
        function disp(i){
            if(i<=10){
                output.innerHTML+=i+"<br>";
                disp(i+1);
            }
        }
        disp(1);
    </script>
</body>
</html>
