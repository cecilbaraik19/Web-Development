<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt input and alert</title>
</head>
<body>
    <script>
        name=prompt("Enter Name")
        alert("My name is "+name)
        document.write("Name is "+name)
    </script>
</body>
