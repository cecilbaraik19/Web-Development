<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OR Operator</title>
</head>
<body>
    <script>
        ch=prompt("Enter any character")
        if(ch=='a'||ch=='e'||ch=='i'||ch=='o'||ch=='u'){
            document.write("<font color='green'>Lower Vowel</font>")
        }else if(ch=='A'||ch=='E'||ch=='I'||ch=='O'||ch=='U'){
            document.write("<font color='blue'>Upper Vowel</font>")
        }else{
            document.write("<font color='red'>Invalid Vowel</font>")
        }
    </script>
</body>
</html>
