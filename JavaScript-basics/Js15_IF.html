<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>If Condition</title>
</head>
<body>
    <script>
        marks=parseInt(prompt("Enter Marks"))
        if(marks>=90){
            document.write("Eligible for Admission")
        }
    </script>
</body>
</html>
