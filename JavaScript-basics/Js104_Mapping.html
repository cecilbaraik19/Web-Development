<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Javascript Maps</h1>
    <h2>The new map method()</h2>
    <p>Creating a map from an array:</p>
    <p id="demo"></p>
    <script>
        const fruits = new Map([
            ["Apples",500],
            ["Mango",300],
            ["orange",200]
        ]);
        let number = fruits.get("Apples");
        document.getElementById("demo").innerHTML="There are "+number+" Apples";
    </script>
</body>
</html>
