<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="output"></p>
    <script>
        const output = document.getElementById("output")
        n=parseInt(prompt("Enter any No."))
        let f = 1
        while(n>0){
            if(n>1){
                output.innerHTML+=n+"x"
            }else{
                output.innerHTML+=n 
            }
            f=f*n
            n--
        }
        output.innerHTML+="="+f
    </script>
</body>
</html>
