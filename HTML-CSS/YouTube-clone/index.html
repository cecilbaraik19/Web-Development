<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>youtube-clone</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <aside>
      <div class="bars">
        <img src="icons/bars.svg" alt="bars">
      </div>
      <div class="side-icons">
        <i>
          <img src="icons/home.svg" alt="home">
        </i>
        <p>Home</p>
      </div>
      <div class="side-icons">
        <i>
          <img src="icons/compass.svg" alt="compass">
        </i>
        <p>Explore</p>
      </div>
      <div class="side-icons">
        <i>
          <img src="icons/video-gallary.svg" alt="video">
        </i>
        <p>Subscriptions</p>
      </div>
      <div class="side-icons">
        <i>
          <img src="icons/video-library.svg" alt="library">
        </i>
        <p>Library</p>
      </div>
    </aside>
     <div class="main-container">
       <header>
      <nav>
        <div class="logo">
          <img src="./images/youtube-logo.png" alt="youtube logo" />
        </div>
        <div class="center-nav">
          <div class="search">
            <input type="text" />
            <button>
              <img src="./icons/search.svg" alt="searchbar" />
            </button>
          </div>
          <div class="mic">
            <img src="icons/mic.svg" alt="mic" />
          </div>
        </div>
        <div class="side-nav">
          <i>
            <img src="icons/video-add.svg" alt="video add" />
          </i>
          <li>
            <img src="icons/dot-grid.svg" alt="dot-grid" />
          </li>
          <li>
            <img src="icons/bell.svg" alt="bell" />
          </li>
          <li>
            <img src="" alt="avatar" />
          </li>
        </div>
      </nav>
      <div class="tags">
            <div class="tag dark">All</div>
            <div class="tag light">Mixes</div>
            <div class="tag light">Crypto</div>
            <div class="tag light">Html</div>
            <div class="tag light">CSS</div>
            <div class="tag light">Javascript</div>
          </div>
    </header>
     </div>
    </div>
  </body>
</html>
